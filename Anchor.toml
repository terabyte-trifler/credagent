[toolchain]
anchor_version = "0.30.1"
solana_version = "2.1.15"

[features]
resolution = true
skip-lint = false

[programs.devnet]
credit_score_oracle = "Cred1111111111111111111111111111111111111111"
lending_pool = "Lend1111111111111111111111111111111111111111"
agent_permissions = "Perm1111111111111111111111111111111111111111"

[programs.localnet]
credit_score_oracle = "Cred1111111111111111111111111111111111111111"
lending_pool = "Lend1111111111111111111111111111111111111111"
agent_permissions = "Perm1111111111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
